      "logo": "https://syntonera.fr/logo.png",
      "image": "https://syntonera.fr/og-image.jpg",
      "email": "contact@syntonera.fr",
      "areaServed": "Provence-Alpes-Côte d'Azur",
      "knowsLanguage": "fr",
      "sameAs": [
        "https://www.instagram.com/syntonera",
        "https://www.linkedin.com/company/syntonera"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Nos expériences",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "ON era — Séminaires sur mesure",
            "description": "Séminaires d'entreprise immersifs pour fédérer et inspirer vos équipes.",
            "url": "https://syntonera.fr/on-era"
          },
          {
            "@type": "Offer",
            "name": "OFF era — Soirées détente",
            "description": "Soirées immersives en petit groupe au cœur de la Provence.",
            "url": "https://syntonera.fr/off-era"
          }
        ]
      }
    }
    </script>

    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que Syntonera ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Syntonera crée des expériences immersives de bien-être en Provence. Que ce soit pour une soirée entre amis ou un séminaire d'équipe, nous imaginons des moments sur mesure qui invitent à ralentir, se reconnecter et repartir plus léger."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles expériences proposez-vous ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous proposons deux formats. OFF era : des soirées bien-être en petit groupe, pensées pour les particuliers qui souhaitent s'offrir une parenthèse. ON era : des séminaires immersifs pour les équipes, conçus pour fédérer et inspirer autrement."
          }
        },
        {
          "@type": "Question",
          "name": "À qui s'adressent vos expériences ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "À toute personne en quête d'un moment de pause. Les soirées OFF era accueillent les particuliers, seuls ou entre proches. Les séminaires ON era s'adressent aux petites équipes et entreprises à taille humaine."
          }
        },
        {
          "@type": "Question",
          "name": "Où se déroulent les expériences ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En Provence, dans des lieux soigneusement choisis pour leur authenticité et leur sérénité. Chaque cadre est sélectionné pour sublimer l'expérience et inviter au lâcher-prise."
          }
        },
        {
          "@type": "Question",
          "name": "Les expériences sont-elles personnalisables ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, chaque expérience est pensée sur mesure. Vous choisissez le format — demi-journée, journée, soirée — les activités parmi nos univers thématiques, et nous adaptons la restauration avec des partenaires locaux."
          }
        },
        {
          "@type": "Question",
          "name": "Comment réserver ou vous contacter ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Écrivez-nous à contact@syntonera.fr ou utilisez le formulaire sur notre page de contact. Nous échangerons ensemble pour imaginer l'expérience qui vous ressemble."
          }
        }
      ]
    }
    </script>
